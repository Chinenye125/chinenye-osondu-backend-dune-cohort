
<!-- Add {% load static %} at the top of every template that uses static files -->
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ToriloShop{% endblock %}</title>
  <!-- {% static 'path' %} generates the correct URL to the file -->
  <link rel='stylesheet' href="{% static 'css/main.css' %}">
  
</head>
<body>

  <script src="{% static 'js/main.js' %}"></script>
  
  <nav>
    <a href="/" class="logo">
      <img src="{% static 'images/logo.png' %}" alt="ToriloShop Logo">
    </a>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/products">Products</a>
      <a href="/about">About</a>
      <a href="/categories/">Categories</a>
    </div>
  </nav>

  <main>
   {% if messages %}
     <div id="msg-container">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">
           {{ message }}
          </div>
        {% endfor %}
      </div>
     <script>
       setTimeout(function() {
         let msg = document.getElementById("msg-container");
          if (msg) {
           msg.style.display = "none";
          }
        }, 4000);
      </script>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>ToriloShop &copy; 2026</p>
  </footer>
</body>
</html>
