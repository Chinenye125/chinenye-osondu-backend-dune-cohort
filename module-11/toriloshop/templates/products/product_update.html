{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div style="max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">

    <h2 style="text-align: center; margin-bottom: 20px;">Edit Product</h2>

    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>

        <button type="submit"
                style="width: 100%; background: #007bff; color: white; padding: 10px; border: none; border-radius: 5px;">
            Update Product
        </button>
    </form>

    <br>

    <div style="text-align: center;">
        <a href="{% url 'product_list' %}" style="color: #1a1a2e;">
            ← Back to Products
        </a>
    </div>

</div>

{% endblock %}
