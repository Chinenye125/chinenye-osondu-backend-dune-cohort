{% extends 'base.html' %}

{% block title %}Delete Product{% endblock %}

{% block content %}

<div style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);">

    <h2 style="margin-bottom: 10px; color: #1a1a2a;">Delete Product</h2>

    <p style="color: #555;">Are you sure you want to delete:</p>

    <h3 style="margin: 10px 0 20px 0; color: #000;">{{ product.name }}</h3>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" style="background: #1a1a2a; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px;">
            Yes, Delete
        </button>

        <a href="{% url 'product_list' %}" style="padding: 10px 20px; border: 1px solid #1a1a2e; border-radius: 6px; text-decoration: none; color: #1a1a2a; margin-left: 10px;">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
