<!-- templates/accounts/login.html  -->
{% extends 'base.html' %}

{% block title %}Login - ToriloShop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>

        <form method='POST'>
           {% csrf_token %}
                  <!-- form is passed automatically by LoginView - no view code needed  -->
           <div class="form-group">
               {{ form.as_p }}
           </div>
           <button type='submit' class="btn-auth">Login</button>
        </form>

        <div class="auth-footer">
            <p>No account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
